<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Gallery - Manage Mode</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; margin: 0; background: #f4ece1; color: #5d4037; padding: 40px 20px; }
        h1 { text-align: center; color: #8d6e63; letter-spacing: 2px; margin-bottom: 10px; }
        .top-nav { text-align: center; margin-bottom: 40px; }
        .add-btn {
            display: inline-block; padding: 10px 25px; background: #ffffff;
            border: 2px solid #d7ccc8; border-radius: 12px; color: #8d6e63;
            text-decoration: none; font-weight: bold; font-size: 14px; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .add-btn:hover { background: #efebe9; border-color: #a1887f; color: #6d4c41; transform: translateY(-2px); }
        .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .char-card { background: #ffffff; border-radius: 15px; border: 1px solid #d7ccc8; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .char-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .char-img { width: 100%; height: 350px; object-fit: cover; border-bottom: 2px solid #f4ece1; }
        .char-info { padding: 20px; }
        .char-name { font-size: 20px; font-weight: bold; color: #795548; margin: 0; }
        .char-faction { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; background: #efebe9; color: #8d6e63; margin-top: 5px; border: 1px solid #d7ccc8; }
        .edit-btn { background: #8d6e63; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; }
        
        #edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-content label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; color: #8d6e63; }
        .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #d7ccc8; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .save-btn { background: #6d4c41; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 16px; }
        .delete-btn { background: #ef4444; color: white; width: 100%; padding: 10px; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="https://akanezz2314.github.io/Akane_system_test03/index.html" class="add-btn">➕ ลงทะเบียนตัวละครใหม่</a>
    </div>

    <h1> 👤ทะเบียนตัวละคร</h1>
    <div id="loading" style="text-align: center; margin-top: 20px;">✨ กำลังโหลดข้อมูลตัวละคร...</div>
    <div class="gallery-container" id="gallery"></div>

    <div id="edit-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:#8d6e63; text-align: center;">📝 จัดการข้อมูล</h2>
            <input type="hidden" id="edit-id">
            <label>รายชื่อตัวละคร</label><input type="text" id="edit-name">
            <label>เผ่าพันธุ์</label>
            <select id="edit-faction">
                <option value="เทพ">เทพ</option>
                <option value="มาร">มาร</option>
                <option value="ผู้วิเศษ">ผู้วิเศษ</option>
                <option value="สามัญชน">สามัญชน</option>
                <option value="อื่น ๆ">อื่น ๆ</option>
            </select>
            <label>บันทึกประวัติ</label><textarea id="edit-bio" rows="3"></textarea>
            <button class="save-btn" onclick="saveEdit()">บันทึกการเปลี่ยนแปลง</button>
            <button class="delete-btn" onclick="deleteCharacter()">ลบรายชื่อนี้ออกจากระบบ</button>
            <button style="margin-top: 15px; background: none; border: none; color: #a1887f; cursor: pointer; width: 100%;" onclick="closeModal()">ยกเลิก</button>
        </div>
    </div>

    <script>
        // ใช้ URL ล่าสุดที่ท่านส่งมา
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyouf8yQuixCSP5zhS6EbjeknYy5335fAx0M4gshQBITd7HUE1ARxHHhgvMVxUT-Q-WLA/exec";
        let allData = [];

        async function fetchCharacters() {
            console.log("Starting to fetch data...");
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                allData = await response.json();
                console.log("Data received:", allData);
                
                if (allData.length === 0) {
                    document.getElementById('loading').innerText = "📭 ยังไม่มีรายชื่อตัวละครในระบบ";
                } else {
                    renderGallery();
                }
            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('loading').innerHTML = `❌ ไม่สามารถติดต่อสารบบได้<br><small style="color: grey;">สาเหตุ: ${e.message}</small>`;
            }
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            document.getElementById('loading').style.display = 'none';
            
            allData.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'char-card';
                // ปรับให้รองรับ imageurl ทั้งตัวเล็กและตัวใหญ่
                const finalImg = char.imageurl || char.imageUrl || char.imageURL || ''; 
                card.innerHTML = `
                    <img src="${finalImg}" class="char-img" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                    <div class="char-info">
                        <p class="char-name">${char.name || 'ไม่ระบุชื่อ'}</p>
                        <span class="char-faction">${char.faction || 'สามัญชน'}</span>
                        <p style="font-size: 14px; margin-top: 10px; line-height:1.5; color:#6d4c41;">${char.bio || 'ไม่มีบันทึกประวัติ'}</p>
                        <button class="edit-btn" onclick="openEdit(${index})">แก้ไข / ลบข้อมูล</button>
                    </div>`;
                gallery.appendChild(card);
            });
        }

        function openEdit(index) {
            const char = allData[index];
            document.getElementById('edit-id').value = char.id;
            document.getElementById('edit-name').value = char.name;
            document.getElementById('edit-faction').value = char.faction;
            document.getElementById('edit-bio').value = char.bio;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('edit-name').value;
            const faction = document.getElementById('edit-faction').value;
            const bio = document.getElementById('edit-bio').value;
            document.querySelector('.save-btn').innerText = "⏳ กำลังจารึก...";
            
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "update", id: id, name: name, faction: faction, bio: bio })
                });
                alert("อัปเดตข้อมูลเรียบร้อย!");
                location.reload();
            } catch (e) {
                alert("เกิดข้อผิดพลาดในการบันทึก");
                document.querySelector('.save-btn').innerText = "บันทึกการเปลี่ยนแปลง";
            }
        }

        async function deleteCharacter() {
            if (!confirm("⚠️ ท่านแน่ใจหรือไม่ที่จะลบรายนามนี้?")) return;
            const id = document.getElementById('edit-id').value;
            document.querySelector('.delete-btn').innerText = "⏳ กำลังลบ...";
            
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "delete", id: id })
                });
                alert("ลบข้อมูลเรียบร้อย!");
                location.reload();
            } catch (e) {
                alert("เกิดข้อผิดพลาดในการลบ");
                document.querySelector('.delete-btn').innerText = "ลบรายชื่อนี้ออกจากระบบ";
            }
        }

        fetchCharacters();
    </script>
</body>
</html>

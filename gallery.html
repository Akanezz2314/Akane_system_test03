<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Gallery - Manage Mode</title>
    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: 'Tahoma', sans-serif; margin: 0; background: #f4ece1; color: #5d4037; padding: 40px 20px; }
        h1 { text-align: center; color: #8d6e63; letter-spacing: 2px; margin-bottom: 30px; }
        
        .top-nav { text-align: center; margin-bottom: 40px; }
        .add-btn {
            display: inline-block; padding: 12px 28px; background: #ffffff;
            border: 2px solid #d7ccc8; border-radius: 12px; color: #8d6e63;
            text-decoration: none; font-weight: bold; font-size: 14px; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .add-btn:hover { background: #efebe9; border-color: #a1887f; color: #6d4c41; transform: translateY(-2px); }

        .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        
        .char-card { 
            background: #ffffff; border-radius: 15px; border: 1px solid #d7ccc8; 
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            transition: 0.3s; cursor: pointer; display: flex; flex-direction: column;
            height: 520px; 
        }
        .char-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .char-img { width: 100%; height: 320px; object-fit: cover; object-position: top; border-bottom: 2px solid #f4ece1; }
        .char-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .char-name { font-size: 18px; font-weight: bold; color: #795548; margin: 0; }
        .char-faction { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; background: #efebe9; color: #8d6e63; margin-top: 5px; width: fit-content; }
        
        .char-bio-preview { 
            font-size: 13px; margin-top: 10px; line-height: 1.5; color: #6d4c41;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; 
            overflow: hidden; text-overflow: ellipsis;
        }

        .edit-btn { background: #8d6e63; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; margin-top: auto; font-weight: bold; font-size: 12px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        #detail-modal .modal-content { max-width: 500px; text-align: center; }
        .detail-img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 15px; margin-bottom: 15px; }
        .stat-badge { background: #f4ece1; padding: 5px 15px; border-radius: 10px; font-size: 14px; margin: 5px; display: inline-block; }

        #crop-modal { z-index: 2000; background: rgba(0,0,0,0.9); }
        .crop-area { width: 100%; height: 350px; background: #333; margin-bottom: 15px; }
        #img-to-crop { max-width: 100%; }

        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #8d6e63; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #d7ccc8; border-radius: 10px; box-sizing: border-box; }
        
        /* ปุ่มลบข้อมูลที่เอากลับมา */
        .delete-btn { background: #ef4444; color: white; width: 100%; padding: 10px; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .save-btn { background: #6d4c41; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="https://akanezz2314.github.io/Akane_system_test03/index.html" class="add-btn">➕ ลงทะเบียนตัวละครใหม่</a>
    </div>

    <h1>👤 ทะเบียนรายนามตัวละคร</h1>
    <div id="loading" style="text-align: center;">✨ กำลังอัญเชิญข้อมูล...</div>
    <div class="gallery-container" id="gallery"></div>

    <!-- 1. ดูข้อมูลละเอียด -->
    <div id="detail-modal" class="modal" onclick="closeModalOutside(event, 'detail-modal')">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('detail-modal').style.display='none'">&times;</span>
            <img id="det-img" class="detail-img">
            <h2 id="det-name" style="color: #8d6e63; margin-bottom: 5px;"></h2>
            <div id="det-faction" class="char-faction"></div>
            <div style="margin: 15px 0;">
                <span id="det-hp" class="stat-badge"></span>
                <span id="det-status" class="stat-badge"></span>
            </div>
            <p id="det-bio" style="text-align: left; line-height: 1.6; color: #5d4037; white-space: pre-wrap;"></p>
        </div>
    </div>

    <!-- 2. แก้ไขข้อมูล (ปุ่มลบกลับมาแล้วครับ) -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align: center; color:#8d6e63;">📝 แก้ไขข้อมูล</h2>
            <input type="hidden" id="edit-id">
            
            <label style="font-size: 12px; font-weight: bold;">เปลี่ยนรูปภาพ</label>
            <input type="file" id="edit-image-input" accept="image/*">
            <div style="text-align:center; margin: 10px 0;">
                <img id="edit-preview-current" style="width:80px; height:100px; object-fit:cover; border-radius:8px; border:1px solid #d7ccc8;">
            </div>

            <label>รายชื่อตัวละคร</label><input type="text" id="edit-name">
            <label>เผ่าพันธุ์</label>
            <select id="edit-faction">
                <option value="เทพ">เทพ</option><option value="มาร">มาร</option><option value="ผู้วิเศษ">ผู้วิเศษ</option><option value="สามัญชน">สามัญชน</option><option value="อื่นๆ">อื่นๆ</option>
            </select>
            <label>บันทึกประวัติ</label><textarea id="edit-bio" rows="4"></textarea>
            
            <button class="save-btn" id="save-btn" onclick="saveEdit()">บันทึกการเปลี่ยนแปลง</button>
            <button class="delete-btn" id="delete-btn" onclick="deleteCharacter()">ลบรายชื่อนี้ออกจากระบบ</button>
            <button style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer; color:grey;" onclick="document.getElementById('edit-modal').style.display='none'">ยกเลิก</button>
        </div>
    </div>

    <!-- 3. ตัดภาพ -->
    <div id="crop-modal" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <h3 style="margin-top:0;">✂️ ตัดภาพตัวละคร (3:4)</h3>
            <div class="crop-area">
                <img id="img-to-crop">
            </div>
            <button class="edit-btn" style="width:100%; padding:10px;" onclick="confirmCrop()">ตกลง ตัดภาพนี้</button>
            <button style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer; color:red;" onclick="closeCropModal()">ยกเลิกการเปลี่ยนรูป</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyouf8yQuixCSP5zhS6EbjeknYy5335fAx0M4gshQBITd7HUE1ARxHHhgvMVxUT-Q-WLA/exec";
        const IMGBB_API_KEY = "22f0d46a823d6fcfd96b1b2754fd195b";
        
        let allData = [];
        let cropper;
        let croppedBlob = null;

        async function fetchCharacters() {
            try {
                const response = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
                allData = await response.json();
                renderGallery();
            } catch (e) { document.getElementById('loading').innerText = "❌ ติดต่อสารบบไม่ได้"; }
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ''; document.getElementById('loading').style.display = 'none';
            allData.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = (e) => { if (e.target.tagName !== 'BUTTON') showDetail(index); };
                const finalImg = char.imageurl || char.imageUrl || ''; 
                card.innerHTML = `
                    <img src="${finalImg}" class="char-img" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                    <div class="char-info">
                        <p class="char-name">${char.name || 'ไม่ระบุชื่อ'}</p>
                        <span class="char-faction">${char.faction || 'สามัญชน'}</span>
                        <div class="char-bio-preview">${char.bio || 'ไม่มีบันทึกประวัติ'}</div>
                        <button class="edit-btn" onclick="openEdit(${index})">⚙️ แก้ไขข้อมูล</button>
                    </div>`;
                gallery.appendChild(card);
            });
        }

        function showDetail(index) {
            const char = allData[index];
            document.getElementById('det-img').src = char.imageurl || char.imageUrl || '';
            document.getElementById('det-name').innerText = char.name;
            document.getElementById('det-faction').innerText = char.faction;
            document.getElementById('det-bio').innerText = char.bio;
            document.getElementById('det-hp').innerText = "❤️ HP: " + (char.hp || '100');
            document.getElementById('det-status').innerText = "✨ สถานะ: " + (char.status || 'ปกติ');
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function openEdit(index) {
            const char = allData[index];
            document.getElementById('edit-id').value = char.id;
            document.getElementById('edit-name').value = char.name;
            document.getElementById('edit-faction').value = char.faction;
            document.getElementById('edit-bio').value = char.bio;
            document.getElementById('edit-preview-current').src = char.imageurl || char.imageUrl || '';
            croppedBlob = null;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        document.getElementById('edit-image-input').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const url = URL.createObjectURL(files[0]);
                const image = document.getElementById('img-to-crop');
                image.src = url;
                document.getElementById('crop-modal').style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(image, { aspectRatio: 3/4, viewMode: 1 });
            }
        });

        function confirmCrop() {
            cropper.getCroppedCanvas({ width: 600, height: 800 }).toBlob((blob) => {
                croppedBlob = blob;
                document.getElementById('edit-preview-current').src = URL.createObjectURL(blob);
                document.getElementById('crop-modal').style.display = 'none';
            }, 'image/jpeg', 0.8);
        }

        function closeCropModal() { document.getElementById('crop-modal').style.display = 'none'; document.getElementById('edit-image-input').value = ""; }

        async function saveEdit() {
            const btn = document.getElementById('save-btn');
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('edit-name').value;
            const faction = document.getElementById('edit-faction').value;
            const bio = document.getElementById('edit-bio').value;
            let finalImageUrl = document.getElementById('edit-preview-current').src;

            btn.innerText = "⏳ กำลังบันทึก...";
            btn.disabled = true;

            try {
                if (croppedBlob) {
                    const formData = new FormData();
                    formData.append("image", croppedBlob);
                    const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const imgData = await imgRes.json();
                    finalImageUrl = imgData.data.url;
                }

                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "update", id: id, name: name, faction: faction, bio: bio, imageUrl: finalImageUrl })
                });
                alert("อัปเดตข้อมูลเรียบร้อย!");
                location.reload();
            } catch (e) {
                alert("เกิดข้อผิดพลาด");
                btn.disabled = false;
                btn.innerText = "บันทึกการเปลี่ยนแปลง";
            }
        }

        async function deleteCharacter() {
            if (!confirm("⚠️ ท่านแน่ใจหรือไม่ที่จะลบรายชื่อนี้ออกจากระบบ?")) return;
            const btn = document.getElementById('delete-btn');
            const id = document.getElementById('edit-id').value;
            btn.innerText = "⏳ กำลังลบ...";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "delete", id: id })
                });
                alert("ลบข้อมูลเรียบร้อย!");
                location.reload();
            } catch (e) {
                alert("เกิดข้อผิดพลาดในการลบ");
                btn.disabled = false;
                btn.innerText = "ลบรายชื่อนี้ออกจากระบบ";
            }
        }

        function closeModalOutside(e, id) { if (e.target.id === id) document.getElementById(id).style.display = 'none'; }

        fetchCharacters();
    </script>
</body>
</html>
